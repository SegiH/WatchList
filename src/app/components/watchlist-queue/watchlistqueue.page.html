<ion-header [translucent]="true">
     <ion-toolbar>
          <ion-buttons slot="start"> 
               <ion-menu-button></ion-menu-button>                
          </ion-buttons>            
          
          <ion-grid>
               <ion-row>
                    <ion-col size="12">
                         <ion-searchbar *ngIf="dataService.isBackendURLSet() && dataService.isLoggedIn"(ionChange)="dataService.searchTermChangeHandler($event)" [disabled]="dataService.isAdding || dataService.isEditing" [(ngModel)]="dataService.searchTerm"></ion-searchbar>
                    </ion-col>
               </ion-row>
          </ion-grid>
     </ion-toolbar>
</ion-header>

<ion-content *ngIf="dataService.isBackendURLSet() && dataService.isLoggedIn">
     <ion-refresher slot="fixed" (ionRefresh)="dataService.pullToRefresh($event,'WatchListQueueItems')">
          <ion-refresher-content></ion-refresher-content>
     </ion-refresher>
    
     <ion-grid>
          <ion-row>
               <ion-col size="1">
                    <ion-icon *ngIf="!dataService.isAdding && !dataService.isEditing" class="addWatchListQueue" name="add-outline" (click)="this.dataService.openDetailOverlay('watchlist-queue')"></ion-icon>
               </ion-col>               
          </ion-row>
     </ion-grid>

     <div class="ion-list-parent">
          <ion-list>
               <ion-item> <!-- Table headers -->
                    <ion-grid>
                         <ion-row>
                              <ion-col [size]="this.dataService.getColumnSize('ID','WatchListQueueItems')">
                                   <ion-label>Queue ID</ion-label>
                                   
                                   <!--<ion-icon *ngIf="dataService.watchListSortDirection =='ASC' && !dataService.isAdding && !dataService.isEditing" [ngClass]="dataService.watchListSortActiveColumn === 'ID' ? 'upArrow IDArrowIcon active' : 'upArrow IDArrowIcon'" name="caret-up-outline" (click)="dataService.sortClick('ID','ASC','WatchList')"></ion-icon><ion-icon *ngIf="dataService.watchListSortDirection =='DESC' && !dataService.isAdding && !dataService.isEditing" [ngClass]="dataService.watchListSortActiveColumn === 'ID' ? 'downArrow IDArrowIcon active' : 'downArrow IDArrowIcon'" name="caret-down-outline" (click)="dataService.sortClick('ID','DESC','WatchList')"></ion-icon>-->
                              </ion-col>
  
                              <ion-col [size]="this.dataService.getColumnSize('Name','WatchListQueueItems')">
                                   <ion-label>Name</ion-label>
                                   
                                   <!--<ion-icon *ngIf="dataService.watchListSortDirection =='ASC' && !dataService.isAdding && !dataService.isEditing" [ngClass]="dataService.watchListSortActiveColumn === 'Name' ? 'upArrow nameArrowIcon active' : 'upArrow nameArrowIcon'" name="caret-up-outline" (click)="dataService.sortClick('Name','ASC','WatchList')"></ion-icon><ion-icon *ngIf="dataService.watchListSortDirection =='DESC' && !dataService.isAdding && !dataService.isEditing" [ngClass]="dataService.watchListSortActiveColumn === 'Name' ? 'downArrow nameArrowIcon active' : 'downArrow nameArrowIcon'" name="caret-down-outline" (click)="dataService.sortClick('Name','DESC','WatchList')"></ion-icon>-->
                              </ion-col>
  
                              <ion-col [size]="this.dataService.getColumnSize('Notes','WatchListQueueItems')">
                                   <ion-label>Notes</ion-label>
                              </ion-col>
                        </ion-row>
                    </ion-grid>               
               </ion-item>

               <ion-item *ngFor="let currWatchListQueue of dataService.watchListQueue"> <!-- Data Panel -->
                    <ion-grid>
                         <ion-row>
                              <ion-col [size]="this.dataService.getColumnSize('ID','WatchListQueueItems')" class="IDColumn">
                                   <a class="detailLink" (click)="this.dataService.openDetailOverlay('watchlist-queue',currWatchListQueue.WatchListQueueItemID)">{{ currWatchListQueue.WatchListQueueItemID }}</a>
                              </ion-col>
                
                              <ion-col [size]="this.dataService.getColumnSize('Name','WatchListQueueItems')" class="nameColumn">
                                   <div *ngIf="!dataService.isEditing">
                                        <div *ngIf="dataService.getIMDBURL(currWatchListQueue.WatchListQueueItemID) === null; else hyperLinkDiv">
                                             {{dataService.getWatchListItemName(currWatchListQueue.WatchListItemID)}}
                                        </div>
                
                                        <ng-template #hyperLinkDiv>
                                             <a [href]="dataService.getIMDBURL(currWatchListQueue.WatchListItemID)" target="_blank">{{dataService.getWatchListItemName(currWatchListQueue.WatchListItemID)}}</a>
                                        </ng-template>
                                    </div>
                              </ion-col>
                
                              <ion-col [size]="this.dataService.getColumnSize('Notes','WatchListQueueItems')">
                                   {{ currWatchListQueue.Notes }}
                              </ion-col>
                         </ion-row>
                    </ion-grid>
                </ion-item>
          </ion-list>
     </div>
</ion-content>
