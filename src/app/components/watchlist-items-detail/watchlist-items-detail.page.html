<ion-grid>
     <ion-grid>
          <ion-row>
               <ion-col size="1">
                    <ion-icon *ngIf="!isAdding && !isEditing" name="create-outline" (click)="editWatchListItem()"></ion-icon>
                    <ion-icon *ngIf="isAdding || isEditing" name="save-outline" (click)="saveWatchListItem()"></ion-icon>
               </ion-col>
  
               <ion-col size="1"></ion-col>
  
               <ion-col size="2">
                    <ion-icon *ngIf="isAdding || isEditing" name="close-circle-outline" (click)="cancelWatchListItem()"></ion-icon>
               </ion-col>
         
               <ion-col size="7"></ion-col>
  
              <ion-col size="1">
                    <ion-icon  *ngIf="!isAdding && !isEditing" name="close-outline" class="cancelButton" (click)="dataService.closeOverlay()"></ion-icon>
               </ion-col>
          </ion-row>
  
          <ion-row>
               <ion-col [size]="12"></ion-col>
          </ion-row>
     </ion-grid>

     <ion-row *ngIf="!isAdding">
          <ion-col [size]="2">
               <ion-label>Item ID</ion-label>
          </ion-col>
 
          <ion-col [size]="1"></ion-col>
 
          <ion-col [size]="9">
               <ion-label>
                    {{ detailObject['WatchListItemID'] }}
               </ion-label>
          </ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="12"></ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="2">
               <ion-label>Name</ion-label>
          </ion-col>

          <ion-col [size]="1"></ion-col>
         
          <ion-col [size]="9">
               <ion-label *ngIf="!isEditing && !isAdding">
                    {{ detailObject['WatchListItemName'] }}
               </ion-label>

               <ion-input *ngIf="isEditing" class="editAddSelect" type="text" [(ngModel)]="detailObject['WatchListItemName']" [value]="detailObject['WatchListItemName']" ></ion-input>

               <ion-input *ngIf="isAdding" class="editAddSelect" type="text" [(ngModel)]="addItemName" [value]="addItemName" ></ion-input>
          </ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="12"></ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="2">
               <ion-label>Type</ion-label>
          </ion-col>

          <ion-col [size]="1"></ion-col>
      
          <ion-col [size]="9">
               <ion-label *ngIf="!isEditing && !isAdding">
                    {{ dataService.getWatchListTypeName(detailObject['WatchListTypeID']) }}
               </ion-label>

               <select class="editAddSelect" *ngIf="isEditing" placeholder='Type' name="title" [(ngModel)]="detailObject['WatchListTypeID']">
                    <option *ngFor="let currItem of dataService.watchListTypes;trackBy: dataService.trackByFn" [value]="currItem['WatchListTypeID']">{{currItem['WatchListTypeName']}}</option>
               </select>

               <select class="editAddSelect" *ngIf="isAdding" placeholder='Type' name="title" [(ngModel)]="addItemType">
                    <option *ngFor="let currItem of dataService.watchListTypes;trackBy: dataService.trackByFn" [value]="currItem['WatchListTypeID']">{{currItem['WatchListTypeName']}}</option>
               </select>
          </ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="12"></ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="2">
               <ion-label>IMDB URL</ion-label>
          </ion-col>

          <ion-col [size]="1"></ion-col>
   
          <ion-col [size]="9">
               <ion-label *ngIf="!isEditing && !isAdding">
                    {{ detailObject['IMDB_URL'] }}
               </ion-label>

               <ion-input *ngIf="isEditing" class="editAddSelect" type="text" [(ngModel)]="detailObject['IMDB_URL']"></ion-input>

               <ion-input *ngIf="isAdding" class="editAddSelect" type="text" [(ngModel)]="addItemIMDBURL"></ion-input>
          </ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="12"></ion-col>
     </ion-row>

     <ion-row>
          <ion-col [size]="2">
               <ion-label>Notes</ion-label>
          </ion-col>

          <ion-col [size]="1"></ion-col>

          <ion-col [size]="9">
               <ion-label *ngIf="!isEditing && !isAdding">
                    {{ detailObject['Notes'] }}
               </ion-label>

               <ion-input *ngIf="isEditing && !isAdding" class="editAddSelect" type="text" [(ngModel)]="detailObject.Notes"></ion-input>

               <ion-input *ngIf="isAdding" type="text" class="editAddSelect" [(ngModel)]="addItemNotes"></ion-input>
          </ion-col>
     </ion-row>
</ion-grid>

<ion-icon id="deleteIcon" name="trash-outline" *ngIf="!isAdding" (click)="deleteWatchListItem(currWatchListItem)"></ion-icon>
