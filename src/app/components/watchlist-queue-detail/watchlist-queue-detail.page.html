<ion-content *ngIf="dataService.isBackendURLSet() && dataService.isLoggedIn">
     <ion-refresher slot="fixed" (ionRefresh)="dataService.pullToRefresh($event,'WatchListQueueItems')">
          <ion-refresher-content></ion-refresher-content>
     </ion-refresher>

     <div class="ion-list-parent">
          <ion-list>
               <ion-item>
                    <ion-grid>
                         <ion-grid>
                              <ion-row>
                                   <ion-col size="1">
                                        <ion-icon *ngIf="!isAdding && !isEditing" name="create-outline" (click)="editWatchListQueueItem()"></ion-icon>
                                        <ion-icon *ngIf="isAdding || isEditing" name="save-outline" (click)="saveWatchListQueueItem()"></ion-icon>
                                   </ion-col>
 
                                   <ion-col size="1"></ion-col>
 
                                   <ion-col size="2">
                                        <ion-icon *ngIf="isAdding || isEditing" name="close-circle-outline" (click)="cancelWatchListQueueItem()"></ion-icon>
                                   </ion-col>
        
                                   <ion-col size="7"></ion-col>
 
                                   <ion-col size="1">
                                        <ion-icon  *ngIf="!isAdding && !isEditing" name="close-outline" class="cancelButton" (click)="dataService.closeOverlay()"></ion-icon>
                                   </ion-col>
                              </ion-row>
 
                              <ion-row>
                                   <ion-col [size]="12"></ion-col>
                              </ion-row>
                         </ion-grid>

                         <ion-row>
                              <ion-col [size]="2">
                                   <ion-label>Queue ID</ion-label>
                              </ion-col>

                              <ion-col [size]="1"></ion-col>

                              <ion-col [size]="9">
                                   <ion-label *ngIf="!isAdding">
                                        {{ detailObject.WatchListQueueItemID }}
                                   </ion-label>
                              </ion-col>
                         </ion-row>

                         <ion-row>
                              <ion-col [size]="12"></ion-col>
                         </ion-row>

                         <ion-row>
                              <ion-col [size]="2">
                                   <ion-label>Name</ion-label>
                              </ion-col>

                              <ion-col [size]="1"></ion-col>
        
                              <ion-col [size]="9">
                                   <ion-label *ngIf="!isEditing && !isAdding">{{ dataService.getWatchListItemName(detailObject.WatchListItemID) }}</ion-label>

                                   <select class="editAddSelect" *ngIf="isEditing" placeholder='Name' name="title" type="number" [(ngModel)]="detailObject.WatchListItemID">
                                        <option *ngFor="let currItem of dataService.watchListNames;trackBy: dataService.trackByFn" [value]="currItem.WatchListItemID">{{currItem.WatchListItemName}}</option>
                                  </select>

                                  <select class="editAddSelect" *ngIf="isAdding" placeholder='Name' name="title" type="number" [(ngModel)]="addQueueItemID">
                                       <option *ngFor="let currItem of dataService.watchListNames;trackBy: dataService.trackByFn" [value]="currItem.WatchListItemID">{{currItem.WatchListItemName}}</option>
                                  </select>
                              </ion-col>
                         </ion-row>

                         <ion-row>
                              <ion-col [size]="12" *ngIf="!isEditing && !isAdding"></ion-col>
                         </ion-row>

                         <ion-row *ngIf="!isAdding">
                              <ion-col [size]="2">
                                   <ion-label>Type</ion-label>
                              </ion-col>

                              <ion-col [size]="1"></ion-col>

                              <ion-col [size]="9">
                                   <ion-label>{{ dataService.getWatchListTypeName(detailObject.WatchListTypeID) }}</ion-label>
                              </ion-col>
                         </ion-row>

                         <ion-row>
                              <ion-col [size]="12"></ion-col>
                         </ion-row>

                         <ion-row>
                              <ion-col [size]="2">
                                   <ion-label>Notes</ion-label>
                              </ion-col>

                              <ion-col [size]="1"></ion-col>

                              <ion-col [size]="9">
                                   <ion-label *ngIf="!isEditing && !isAdding">{{ detailObject.Notes }}</ion-label>

                                   <ion-input *ngIf="isEditing" class="editAddSelect" type="text" [(ngModel)]="detailObject.Notes"></ion-input>

                                   <ion-input *ngIf="isAdding" class="editAddSelect" type="text" [(ngModel)]="addItemNotes"></ion-input>
                              </ion-col>
                         </ion-row>
                    </ion-grid>

                    <ion-icon id="deleteIcon" name="trash-outline" *ngIf="!isAdding" (click)="deleteWatchListItem(currWatchListItem)"></ion-icon>
               </ion-item>
          </ion-list>
     </div>
</ion-content>
