<ion-app>
     <ion-menu contentId="main-content" type="push"> 
          <ion-header> 
               <ion-toolbar> 
                    <ion-title>Menu</ion-title> 
               </ion-toolbar> 
          </ion-header> 
          <ion-content>
               <ion-grid>
                    <ion-row>
                         <ion-col size="12">
                              <ion-searchbar (ionChange)="reloadData()" [disabled]="dataService.isAdding || dataService.isEditing" [(ngModel)]="dataService.searchTerm"></ion-searchbar>
                         </ion-col>

                         <ion-col size="3" id="rowsLabel">
                              <ion-label>Rows</ion-label>
                         </ion-col>

                         <ion-col size="9">
                              <ion-select placeholder='Record Limit' name="recordLimit" [(ngModel)]="dataService.recordLimit" (ionChange)="reloadData()">
                                   <ion-select-option *ngFor="let currItem of recordLimitOptions;trackBy: trackByFn" [value]="currItem">{{currItem}}</ion-select-option>
                              </ion-select>          
                         </ion-col>

                         <ion-col size="12">
                              <ion-item>Mobile<ion-toggle [(ngModel)]="dataService.isMobilePlatform" color="primary"></ion-toggle></ion-item>
                         </ion-col>

                         <ion-col size="12">
                              <ion-item>Incomplete<ion-toggle [(ngModel)]="dataService.incompleteFilter" color="primary" (ionChange)="reloadData()"></ion-toggle></ion-item>
                         </ion-col>

                         <ion-col size="12">
                              <ion-item>IMDB URL Missing<ion-toggle id="IMDBURLMissing" [(ngModel)]="dataService.imdb_url_missing" color="primary" (ionChange)="reloadData($event)"></ion-toggle></ion-item>
                         </ion-col>

                         <ion-col size="9">
                              <ion-select placeholder='Source' name="source" [(ngModel)]="dataService.sourceFilter" (ionChange)="reloadData()">
                                   <ion-select-option value="All">All</ion-select-option>
                                   <ion-select-option *ngFor="let currItem of dataService.watchListSources;trackBy: trackByFn" [value]="currItem['WatchListSourceID']" (ionChange)="reloadData()">{{currItem['WatchListSourceName']}}</ion-select-option>
                              </ion-select>
                         </ion-col>

                         <ion-col size="12">
                              <ion-input id="backendURLInput" type="text" placeholder="Backend URL" [(ngModel)]="dataService.backendURL" [value]="dataService.backendURL" (ionBlur)="dataService.setBackendURL()"></ion-input>
                         </ion-col>
                    </ion-row>
               </ion-grid>
          </ion-content>
     </ion-menu>

     <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
