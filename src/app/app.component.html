<ion-app>
     <ion-menu *ngIf="dataService.isBackendURLSet() && dataService.isLoggedIn" contentId="main-content" type="push"> 
          <ion-header> 
               <ion-toolbar> 
                    <ion-title>Menu</ion-title> 
               </ion-toolbar> 
          </ion-header> 

          <ion-content>
               <ion-grid>
                    <ion-row>
                         <ion-col size="3" id="rowsLabel">
                              <ion-label>Rows</ion-label>
                         </ion-col>

                         <ion-col size="9">
                              <ion-select placeholder='Record Limit' name="recordLimit" [(ngModel)]="dataService.recordLimit" (ionChange)="reloadData($event)">
                                   <ion-select-option *ngFor="let currItem of recordLimitOptions;trackBy: trackByFn" [value]="currItem">{{currItem}}</ion-select-option>
                              </ion-select>
                         </ion-col>

                         <ion-col size="12" *ngIf="currentRoute==='WatchList'">
                              <ion-item>Still watching<ion-toggle [(ngModel)]="dataService.incompleteFilter" color="primary" (ionChange)="reloadData($event)"></ion-toggle></ion-item>
                         </ion-col>

                         <ion-col size="12" *ngIf="currentRoute==='WatchListItems'">
                              <ion-item>IMDB URL Missing<ion-toggle id="IMDBURLMissing" [(ngModel)]="dataService.imdb_url_missing" color="primary" (ionChange)="reloadData($event)"></ion-toggle></ion-item>
                         </ion-col>

                         <ion-col size="12" *ngIf="currentRoute==='WatchList'">
                              <ion-select placeholder='Source' name="source" [(ngModel)]="dataService.sourceFilter" (ionChange)="reloadData($event)">
                                   <ion-select-option value="All">All</ion-select-option>
                                   <ion-select-option *ngFor="let currItem of dataService.watchListSources;trackBy: trackByFn" [value]="currItem['WatchListSourceID']" (ionChange)="reloadData($event)">{{currItem['WatchListSourceName']}}</ion-select-option>
                              </ion-select>
                         </ion-col>

                         <ion-col size="12" *ngIf="currentRoute==='WatchList'">
                              <ion-select placeholder='Type' name="type" [(ngModel)]="dataService.typeFilter" (ionChange)="reloadData($event)">
                                   <ion-select-option value="All">All</ion-select-option>
                                   <ion-select-option *ngFor="let currItem of dataService.watchListTypes;trackBy: trackByFn" [value]="currItem['WatchListTypeID']" (ionChange)="reloadData($event)">{{currItem['WatchListTypeName']}}</ion-select-option>
                              </ion-select>
                         </ion-col>
                    </ion-row>

                    <ion-row *ngIf="!isEditingOptions">
                         <ion-col size="12"></ion-col>
                         <ion-col size="12"></ion-col>
                         <ion-col size="12"></ion-col>

                         <ion-col size="3" class="align">
                              Sign Out
                         </ion-col>
                         <ion-col size="2">
                              <ion-icon class="optionsIcon" name="log-out-outline" (click)="signOut()"></ion-icon>
                         </ion-col> 
                    </ion-row>
               </ion-grid>
          </ion-content>
     </ion-menu>

     <ion-router-outlet id="main-content"></ion-router-outlet>     
</ion-app>
